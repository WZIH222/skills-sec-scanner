version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      #set a strong password here for production use
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: skills_sec
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database - change password here if you change it in the db service
      DATABASE_URL: postgresql://postgres:your_password@db:5432/skills_sec
      # Redis - no password for simplified setup
      REDIS_URL: redis://redis:6379
      # Security - stable keys for Docker (generated once, must persist across restarts)
      ENCRYPTION_KEY: 78b9KsdkIuK6USC0cNNI6YvpynSTBCkRdxp9LahSwpI=
      JWT_SECRET: eeMdnd8qWf4M0VtX4qnGePLUHe31Tfya85Ac1xGOOK0=
      # AI config is stored in database and configured via frontend Settings page
      # CORS - allow web app
      WEB_APP_URL: http://localhost:3000
    ports:
      - "3001:3001"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    depends_on:
      api:
        condition: service_started
    environment:
      # Database - change password here if you change it in the db service
      DATABASE_URL: postgresql://postgres:your_password@db:5432/skills_sec
      # Redis - no password for simplified setup
      REDIS_URL: redis://redis:6379
      # Security - stable keys for Docker (same as API for decryption)
      ENCRYPTION_KEY: 78b9KsdkIuK6USC0cNNI6YvpynSTBCkRdxp9LahSwpI=
      JWT_SECRET: eeMdnd8qWf4M0VtX4qnGePLUHe31Tfya85Ac1xGOOK0=
      NEXT_PUBLIC_API_URL: http://api:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
